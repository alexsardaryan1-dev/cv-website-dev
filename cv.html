<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alex Sardaryan. CV.</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
    <style>
        @import url('https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,100..1000;1,9..40,100..1000&display=swap');

        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        :root {
            --dark: #121212;
            --dark-blue: #0C1117;
            --brighter-dark: #2a2a2a;
            --green: #DFF11E;
            --white: #f0f0f0;
            --grey: #94a3b8;
        }

        body {
            background-color: var(--brighter-dark);
            font-family: "Inter", sans-serif;
            margin: 0;
            padding: 20px;
            color: white;
            font-family: "DM Sans", sans-serif;
            font-optical-sizing: auto;
            font-weight: 400;
            font-style: normal;
        }

        .cv-page {
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
            /* border-radius: 15px;
            box-shadow: var(--green) 0px 0px 10px; */
        }

        .header-container {
            display: flex;
            flex-direction: column;
            row-gap: 10px;
            padding: 20px;
            background-color: var(--dark-blue);
            border-left: 3px solid var(--green);
        }

        .header-job {
            font-size: 18px;
            color: var(--green);
            font-weight: 500;
        }

        .header-name {
            font-size: 40px;
            font-weight: 700;
        }

        .header-info {
            font-size: 18px;
            color: var(--grey);
            display: flex;
            flex-direction: column;
            row-gap: 10px;
        }


        .header-info span,
        .header-info a {
            display: flex;
            align-items: center;
            gap: 6px;
            color: var(--grey);
            text-decoration: none;
        }

        .header-info a:hover {
            color: #DFF11E;
            transition: 0.3s ease;
        }

        .open-to-work {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 8px;
    }

    .available-info {
      display: flex;
      align-items: center;
      gap: 6px;
      background: rgba(223, 241, 30, 0.1);
      border: 1px solid rgba(223, 241, 30, 0.3);
      padding: 6px 12px;
      border-radius: 20px;
      font-size: 11px;
      color: #DFF11E;
      font-family: 'JetBrains Mono', monospace;
      letter-spacing: 0.08em;
    }

    .dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: #DFF11E;
      animation: pulse 1.5s ease-out infinite;
      position: relative;
    }

    @keyframes pulse {
      0% {
        box-shadow: 0 0 0 0 rgba(223, 241, 30, 0.6);
      }

      100% {
        box-shadow: 0 0 0 6px rgba(223, 241, 30, 0);
      }
    }




        .body-container {
            display: flex;
            padding: 20px;
        }
    </style>
</head>

<body>
    <div class="cv-page">

        <div class="header-container">
            <div>
                <div class="header-job">FULL STACK DEVELOPER</div>
                <div class="header-name">Alex Sardaryan</div>
                <div class="header-info">
                    <span><i class="fa-solid fa-earth-americas"></i>Armenia, Yerevan</span>
                    <span><a href="mailto:alexsardaryan1@gmail.com"><i
                                class="fa-solid fa-envelope"></i>alexsardaryan1@gmail.com</a></span>
                    <span><a href="https://github.com/alexsardaryan1-dev" target="_blank"><i
                                class="fa-brands fa-github"></i>github.com/alexsardaryan1-dev</a></span>
                </div>
            </div>
            <div class="open-to-work">
                <div class="available-info">
                    <span class="dot"></span>
                    Open to Work
                </div>
            </div>


        </div>

        <div class="body-container">

            <main>

            </main>

            <aside class="right-panel">


            </aside>


        </div>

    </div>

</body>

</html>
